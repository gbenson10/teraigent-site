<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Teraigent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030005; color: #fff; letter-spacing: -0.02em; }
        .border-subtle { border-color: rgba(139, 92, 246, 0.15); }
        .btn-primary { 
            background-color: #7c3aed; 
            color: #fff; 
            transition: all 0.2s ease; 
        }
        .btn-primary:hover {
            background-color: #6d28d9;
        }
    </style>
</head>
<body class="antialiased selection:bg-purple-500/30 flex flex-col min-h-screen">

    <!-- Navigation -->
    <nav class="w-full px-8 py-4 flex justify-between items-center border-b border-subtle backdrop-blur-md sticky top-0 z-50 bg-[#030005]/80">
        <div class="text-2xl font-bold tracking-tight text-white"><a href="/"><span class="text-purple-500">Tera</span>igent</a></div>
        <div class="hidden md:flex space-x-6 text-sm font-medium text-gray-300">
            <a href="/" class="hover:text-white transition">Home</a>
            <a href="/products.html" class="hover:text-white transition">Products</a>
            <a href="/results.html" class="hover:text-white transition">Results</a>
            <a href="/resources.html" class="hover:text-white transition">Resources</a>
            <a href="/testimonials.html" class="hover:text-white transition">Testimonials</a>
            <a href="/about.html" class="hover:text-white transition">About</a>
        </div>
        <a href="/getting-started.html" class="px-6 py-2 btn-primary rounded-full text-sm font-semibold tracking-wide">Get Started</a>
    </nav>

    <!-- Header Section -->
    <main class="flex-grow max-w-4xl mx-auto px-8 py-24 w-full">
        <h1 class="text-5xl font-bold tracking-tight mb-6 text-center">Contact Us</h1>
        <p class="text-xl text-gray-400 mb-12 text-center">Inquire about our bespoke AI Ops & Automation Retainers.</p>
        
        <div class="max-w-2xl mx-auto p-10 border border-subtle rounded-2xl bg-white/5">
            <form action="mailto:Teraigent@yahoo.com" method="POST" enctype="text/plain" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Company Name</label>
                    <input type="text" name="Company" class="w-full bg-[#0a0514] border border-subtle rounded-lg px-4 py-3 text-white focus:outline-none focus:border-purple-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Engineering / Support Headcount</label>
                    <input type="text" name="Headcount" class="w-full bg-[#0a0514] border border-subtle rounded-lg px-4 py-3 text-white focus:outline-none focus:border-purple-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Primary Bottleneck / Manual Process</label>
                    <textarea name="Bottleneck" rows="4" class="w-full bg-[#0a0514] border border-subtle rounded-lg px-4 py-3 text-white focus:outline-none focus:border-purple-500" required></textarea>
                </div>
                <button type="submit" class="w-full py-4 btn-primary rounded-xl text-lg font-bold tracking-wide">Request Architecture Audit</button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full px-8 py-12 border-t border-subtle flex flex-col md:flex-row justify-between items-center text-sm text-gray bg-[#030005]">
        <div>&copy; 2026 Teraigent. All rights reserved.</div>
        <div class="mt-4 md:mt-0 flex space-x-6">
            <a href="/privacy.html" class="hover:text-purple-400 transition">Privacy</a>
            <a href="/terms.html" class="hover:text-purple-400 transition">Terms</a>
            <a href="/contact.html" class="hover:text-purple-400 transition">Contact</a>
        </div>
    </footer>

</body>
</html>
